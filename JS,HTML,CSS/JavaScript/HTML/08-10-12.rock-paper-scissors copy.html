       let points = {
    win: document.getElementById("Win"),
    lose: document.getElementById("lose"),
    tie: document.getElementById("Tie"),
  };
  points.win.value = JSON.parse(localStorage.getItem('points'));
  points.lose.value = JSON.parse(localStorage.getItem('points'));
  points.tie.value= JSON.parse(localStorage.getItem('points'));


 
 
  function Game(value){
  let moves = '';
  let moves2 = '';
  let computerNumber;
    const randomNumber = Math.random();
      playerNumber = Number(value);
        playerNumber.value = value;
        if(randomNumber >= 0 && randomNumber <= 0.34){
          computerNumber = 1;
        }else if(randomNumber >= 0.34 && randomNumber <= 0.67){
          computerNumber = 2;
        }else if(randomNumber >= 0.67 && randomNumber <= 1){
          computerNumber = 3;
        }
        let a = document.getElementById("GameField");
        if (playerNumber === 1 && computerNumber === 1){
          a.value = "You - Rock , Computer - Rock, Draw"
          points.tie.value ++;
          localStorage.setItem('points', JSON.stringify(points.tie.value));
          moves = 'rock-emoji.png'
          moves2 = 'rock-emoji.png'
          document.querySelector('.d').innerHTML = 
          `<p class = "p">You</p>
          <img class = "img2" src="Photo/${moves}">
          <img class = "img2" src="Photo/${moves2}">
          <p class = "p">Computer</p>`;
        }else if (playerNumber === 2 && computerNumber === 2){
          a.value = "You - Paper , Computer - Paper, Draw"
          points.tie.value ++;
          localStorage.setItem('points', JSON.stringify(points.tie.value));
          moves = 'paper-emoji.png'
          moves2 = 'paper-emoji.png'

 let autoplayInterval = null; // Для збереження інтервалу
 let isAutoPlaying = false;
 let IntervalID;
 const AutoButton = document.getElementById("Auto-play");
 function Autoplay() {
  if(!isAutoPlaying){
    AutoButton.textContent = 'Stop Playing';
    IntervalID= setInterval(() => {
      let num = Math.random();
      let playerNumber;
      if(num >= 0 && num<= 0.35){
      playerNumber = 1;
    }else if(num >= 0.35 && num <= 0.7){
      playerNumber = 2;
    }else if(num >= 0.7 && num <= 1){
      playerNumber = 3;
    }
      Game(playerNumber);
     }, 1000);
    isAutoPlaying = true;
  } else {
    clearInterval(IntervalID);
    isAutoPlaying = false;
    AutoButton.textContent = 'Play';
  }
 }
